[package]
name = "protheeuz/satset"
description = "High-performance, buffer-backed hybrid networking for Roblox with zero-allocation delta synchronization."
version = "0.3.2"
license = "MIT"
registry = "https://github.com/UpliftGames/wally-index"
realm = "shared"
authors = ["Iqbal F"]
lib = "src"
exclude = [
	"**/*.rbxl",
	"**/*.rbxlx",
	"**/*.rbxm",
	".gitattributes",
	".gitignore",
	"comparison/",
	"scratch/",
	"benchmark/",
	"benchmarks/",
	"docs/",
	"references/",
	"*.rbxl",
	"*.rbxlx",
	"build.project.json",
	"package.json",
	"stylua.toml",
	"selene.toml",
	"rokit.toml",
	"wally.lock",
	"CONTRIBUTING.md",
]

[dev-dependencies]
ByteNet = "ffrostflame/bytenet@0.4.6"
BridgeNet2 = "ffrostflame/bridgenet2@1.0.0"
Warp = "imezx/warp@1.0.0"